<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Reset Password| Hidera Locs</title>
    
    <!-- FontAwesome & Bootstrap Framework Stylesheets -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Official Tailwind CSS Play Engine CDN (Fixes the broken layout & MIME console errors) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Your Custom Stylesheets -->
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="style_2.css">
</head>
<body class="bg-black">

    <div class="container vh-100 d-flex justify-content-center align-items-center">
        <div class="col-md-5">
            <div class="auth-card p-5 text-white shadow-lg border border-secondary rounded">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-warning">Reset Password</h2>
                    <p class="text-muted small">Enter your email to receive a reset link</p>
                </div>

                <form>
                    <div class="mb-4">
                        <label class="form-label small text-warning fw-bold">Email Address</label>
                        <input type="email" class="form-control bg-dark text-white border-secondary" placeholder="email@example.com" required>
                    </div>
                    
                    <button type="submit" class="btn btn-warning w-100 fw-bold py-2 mb-3">SEND RESET LINK</button>
                    
                    <div class="text-center">
                        <a href="login.html" class="text-warning text-decoration-none small fw-bold">← Back to Login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
