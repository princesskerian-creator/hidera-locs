<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Hidera Locs</title>
    
    <!-- FontAwesome & Bootstrap Framework Stylesheets -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Official Tailwind CSS Play Engine CDN (Fixes the broken layout & MIME console errors) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Your Custom Stylesheets -->
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="style_2.css">
</head>
<body class="bg-black text-white">

    <div class="container py-5">
        <div class="row g-5 align-items-center">
            <div class="col-lg-6">
                <h1 class="text-warning display-4 fw-bold mb-3">Get In Touch</h1>
                <p class="text-white-50">Have questions about our loc services? Send us a message directly!</p>
                
                <ul class="list-unstyled mt-4 fs-5">
                    <li class="mb-3"><i class="fas fa-phone text-warning me-2"></i> +234 907 669 8916</li>
                    <li class="mb-3"><i class="fas fa-envelope text-warning me-2"></i> info@hideralocs.com</li>
                </ul>

                <div class="d-grid gap-3 mt-4">
                    <a href="https://wa.me/2349076698916" target="_blank" class="auth-card p-3 d-flex align-items-center text-decoration-none text-white border border-success rounded">
                        <i class="fab fa-whatsapp fa-2x text-success me-3"></i>
                        <div>
                            <h6 class="mb-0 fw-bold">WhatsApp Us</h6>
                            <small class="text-muted">Instant response during work hours</small>
                        </div>
                    </a>

                    <a href="tel:+2349076698916" class="auth-card p-3 d-flex align-items-center text-decoration-none text-white border border-secondary rounded">
                        <i class="fas fa-phone-alt fa-2x text-warning me-3"></i>
                        <div>
                            <h6 class="mb-0 fw-bold">Call Directly</h6>
                            <small class="text-muted">+234 907 669 8916</small>
                        </div>
                    </a>
                </div>
            </div>

            <div class="col-lg-6">
                <form class="auth-card p-4 border border-secondary rounded">
                    <div class="mb-3">
                        <input type="text" class="form-control bg-white text-dark border-secondary" placeholder="Your Name" required>
                    </div>
                    <div class="mb-3">
                        <input type="email" class="form-control bg-white text-dark border-secondary" placeholder="Your Email" required>
                    </div>
                    <div class="mb-3">
                        <textarea class="form-control bg-white text-dark border-secondary" rows="5" placeholder="Message" required></textarea>
                    </div>
                    <button class="btn btn-warning w-100 fw-bold py-2">SEND MESSAGE</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
