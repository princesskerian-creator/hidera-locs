<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Hidera Locs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="style_2.css">
</head>
<body class="bg-black text-white">

    <div class="container py-5">
        <h2 class="text-warning fw-bold mb-5 text-center">Secure Checkout</h2>
        
        <div class="row g-5">
            <div class="col-lg-7">
                <div class="auth-card p-4 border border-secondary rounded">
                    <h4 class="mb-4 text-warning">Shipping & Delivery Details</h4>
                    <form id="checkout-form">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="small text-white-50">First Name</label>
                                <input type="text" class="form-control bg-dark text-white border-secondary" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="small text-white-50">Last Name</label>
                                <input type="text" class="form-control bg-dark text-white border-secondary" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="small text-white-50">Customer Contact Email</label>
                            <input type="email" id="email-input" class="form-control bg-dark text-white border-secondary" required placeholder="name@domain.com">
                        </div>
                        <div class="mb-3">
                            <label class="small text-white-50">Street Address</label>
                            <input type="text" class="form-control bg-dark text-white border-secondary" placeholder="House number and street name" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="small text-white-50">City/State</label>
                                <input type="text" class="form-control bg-dark text-white border-secondary" value="Ado, Nigeria" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="small text-white-50">Phone Number</label>
                                <input type="tel" class="form-control bg-dark text-white border-secondary" placeholder="+234..." required>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <div class="col-lg-5">
                <div class="auth-card p-4 border border-warning rounded">
                    <h4 class="mb-4 text-warning">Order Summary</h4>
                    <div id="summary-items" class="mb-3">
                        <div class="d-flex justify-content-between small mb-2">
                            <span>Essential Growth Oil Mixture</span>
                            <span>Calculated dynamically</span>
                        </div>
                    </div>
                    <hr class="border-secondary">
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-white-50">Subtotal</span>
                        <span id="subtotal-display">₦0</span>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-white-50">Shipping (Ado)</span>
                        <span>₦1,500</span>
                    </div>
                    <div class="d-flex justify-content-between h4 fw-bold mt-3 text-warning">
                        <span>Total Balance</span>
                        <span id="summary-total">₦1,500</span>
                    </div>
                    
                    <button type="submit" form="checkout-form" class="btn btn-warning w-100 fw-bold py-3 mt-4">
                        <a href="order-success.html">COMPLETE PAYMENT VIA PAYSTACK</a> 
                    </button>
                    
                    <div class="mt-4 overflow-hidden rounded border border-secondary">
                        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3955.514616423408!2d5.2208035!3d7.6276848!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x1047e7ec9df34ab9%3A0x6b63d91722e171cb!2sAdo%20Ekiti!5e0!3m2!1sen!2sng!4v1710000000000" width="100%" height="200" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Payment Scripts Integration Framework -->
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <script>
        const savedTotal = parseInt(localStorage.getItem('hidera_cart_total')) || 15000;
        const shippingFee = 1500;
        const grandTotal = savedTotal + shippingFee;

        document.getElementById('subtotal-display').innerText = "₦" + savedTotal.toLocaleString();
        document.getElementById('summary-total').innerText = "₦" + grandTotal.toLocaleString();

        const checkoutForm = document.getElementById('checkout-form');
        checkoutForm.addEventListener('submit', function(e){
            e.preventDefault();
            const email = document.getElementById('email-input').value;
            payWithPaystack(email, grandTotal);
        });

        function payWithPaystack(email, amount) {
            let handler = PaystackPop.setup({
                key: 'pk_test_xxxx', // Your live or test public key from paystack dashboard
                email: email,
                amount: amount * 100, 
                currency: 'NGN',
                callback: function(response) {
                    localStorage.removeItem('hidera_cart_total');
                    window.location.href = "order-success.html?reference=" + response.reference;
                },
                onClose: function(response) {
                    alert('Payment execution suspended by user.');
                }
            });
            handler.openIframe();
        }
    </script>
</body>
</html>
