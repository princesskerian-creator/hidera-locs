<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login| Hidera Locs </title>
    
    <!-- FontAwesome & Bootstrap Framework Stylesheets -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Official Tailwind CSS Play Engine CDN (Fixes the broken layout & MIME console errors) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Your Custom Stylesheets -->
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="style_2.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 p-3">

    <div class="auth-card p-4 p-sm-5 shadow-lg" style="max-width: 450px; width: 100%;">
        <div class="text-center mb-4">
            <h1 class="h2 fw-bold text-warning mb-1">WELCOME BACK</h1>
            <p class="text-white-50 small">Log in to view your loyalty status and styles</p>
        </div>

        <form id="login-form" action="dashboard.html">
            <div class="mb-3">
                <label class="form-label small text-warning fw-bold">Email Address</label>
                <input type="email" id="login-email" class="form-control" placeholder="yourname@gmail.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label small text-warning fw-bold">Password</label>
                <input type="password" id="login-pass" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-warning w-100 fw-bold py-2 mb-3">Enter HideraLocs</button>
            <div class="text-center small">
                <span class="text-white-50">New to the family?</span> 
                <a href="signup.html" class="text-warning text-decoration-none fw-bold ms-1">Register here</a>
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="auth.js"></script>

<script>
    document.getElementById('login-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-pass').value;
        
        // 1. Temporary simulated verification check (Replace with your auth.js logic if needed)
        if (email && password) {
            
            // 2. THE FIX: Construct the session block the dashboard is looking for
            const sessionData = {
                name: "Princess Chinecherem", // Sets the custom profile name array
                location: "Ado, Nigeria",
                email: email
            };
            
            // Save it securely inside the browser's local memory bank
            localStorage.setItem('hidera_current_session', JSON.stringify(sessionData));
            
            alert("Login Successful!");
            
            // 3. Now execute the redirect safely
            window.location.href = "index.html";
        } else {
            alert("Invalid email or password details.");
        }
    });
</script>
</body>
</html>
